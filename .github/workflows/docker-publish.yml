name: Publish GHCR Image

on:
    push:
        branches:
            - master
    release:
        types:
            - published

permissions:
    contents: write
    packages: write

concurrency:
    group: publish-ghcr-${{ github.ref }}
    cancel-in-progress: false

jobs:
    publish:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout source
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Set up QEMU
              uses: docker/setup-qemu-action@v3
              with:
                  platforms: arm64,arm

            - name: Log in to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Docker metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ghcr.io/${{ github.repository }}
                  tags: |
                      type=raw,value=dev,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
                      type=match,pattern=v?(\d+\.\d+\.\d+.*),group=1,enable=${{ github.event_name == 'release' }}
                      type=raw,value=latest,enable=${{ github.event_name == 'release' && github.event.release.prerelease == false }}

            - name: Build and push image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: ./Dockerfile
                  platforms: linux/amd64,linux/arm64
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            - name: Set addon version from release tag
              if: github.event_name == 'release'
              run: |
                  VERSION="${{ github.event.release.tag_name }}"
                  VERSION="${VERSION#v}"
                  sed -i "s/^version:.*/version: '$VERSION'/" homeassistant/config.yaml

            - name: Stamp CHANGELOG and sync to addon folders
              if: github.event_name == 'release'
              run: |
                  VERSION="${{ github.event.release.tag_name }}"
                  VERSION="${VERSION#v}"
                  DATE="$(date -u +%Y-%m-%d)"
                  # Replace the [Unreleased] heading with the released version + date.
                  sed -i "0,/^## \[Unreleased\].*/s//## [$VERSION] — $DATE/" CHANGELOG.md
                  # HA doesn't follow symlinks inside add-on folders, so ship real
                  # copies of the canonical root CHANGELOG.md into each addon.
                  cp CHANGELOG.md homeassistant/CHANGELOG.md
                  cp CHANGELOG.md homeassistant-dev/CHANGELOG.md

            - name: Commit version and changelog to master
              if: github.event_name == 'release'
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add homeassistant/config.yaml CHANGELOG.md homeassistant/CHANGELOG.md homeassistant-dev/CHANGELOG.md
                  git commit -m "Release ${{ github.event.release.tag_name }}: stamp version and changelog"
                  git push origin HEAD:master
